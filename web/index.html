<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CitePay Agent — Proof Viewer</title>
<style>
  :root { --bg:#0b0d10; --panel:#14171c; --line:#262b33; --text:#e6e8eb; --muted:#8a929e; --accent:#5eead4; --reject:#4a3236; --select:#1f3d33; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; padding: 32px; line-height:1.5; }
  h1 { font-size: 18px; margin:0 0 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .query { background: var(--panel); border:1px solid var(--line); padding:12px 16px; border-radius:6px; margin-bottom:24px; }
  .cards { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap:12px; margin-bottom:24px; }
  .card { background: var(--panel); border:1px solid var(--line); border-radius:6px; padding:14px; font-size:13px; }
  .card.selected { border-color: var(--accent); background: var(--select); }
  .card.rejected { opacity:0.7; background: var(--reject); }
  .card h3 { margin:0 0 6px; font-size:14px; }
  .tag { display:inline-block; font-size:11px; padding:2px 6px; border-radius:4px; margin-top:6px; }
  .tag.select { background: var(--accent); color:#00201b; }
  .tag.reject { background:#8a4b52; color:#fff; }
  .terms { color: var(--muted); font-size:11px; margin-top:4px; }
  .section { margin-bottom: 24px; }
  .section h2 { font-size:13px; color: var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px; }
  .kv { display:grid; grid-template-columns: 160px 1fr; gap:4px 12px; font-size:13px; background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:12px 16px; }
  .kv div:nth-child(odd) { color: var(--muted); }
  .txref { color: var(--accent); word-break: break-all; }
  .answer { background: var(--panel); border:1px solid var(--accent); border-radius:6px; padding:14px 16px; font-size:13px; }
  .missing { color:#e08a8a; font-size:13px; padding:16px; border:1px dashed #e08a8a; border-radius:6px; }
</style>
</head>
<body>

<script>
function render() {
  const root = document.getElementById('root');
  const raw = document.getElementById('evidence-data').textContent;
  let data;
  try { data = JSON.parse(raw); } catch (e) {
    root.innerHTML = '<div class="missing">Evidence JSON is invalid.</div>';
    return;
  }
  if (data._placeholder) {
    root.innerHTML = '<div class="missing">No real evidence loaded yet. Replace the #evidence-data script tag with evidence-log-v3.json.</div>';
    return;
  }

  const considered = data.events.find(e => e.event === 'candidate_sources_considered').candidates;
  const selectedId = data.selected_source_id;
  const rejectedEvent = data.events.find(e => e.event === 'source_rejected').rejected;
  const rejectedMap = Object.fromEntries(rejectedEvent.map(r => [r.id, r]));

  let html = '';
  html += `<div class="query"><strong>Query:</strong> ${data.query}</div>`;

  html += '<div class="section"><h2>Candidate sources</h2><div class="cards">';
  considered.forEach(c => {
    const isSelected = c.id === selectedId;
    const rej = rejectedMap[c.id];
    html += `<div class="card ${isSelected ? 'selected' : 'rejected'}">
      <h3>${c.id} — ${c.title || ''}</h3>
      <div>price: ${c.price} USDC</div>
      <div>computed relevance: ${c.relevanceScore}</div>
      <div>ratio: ${c.ratio}</div>
      <div class="terms">matched terms: ${(c.matchedTerms || []).join(', ') || '(none)'}</div>
      ${isSelected
        ? '<span class="tag select">SELECTED — paid</span>'
        : `<span class="tag reject">REJECTED — ${rej ? rej.reason : ''}</span>`}
    </div>`;
  });
  html += '</div></div>';

  html += `<div class="section"><h2>Live payment</h2><div class="kv">
    <div>payment_mode</div><div>${data.payment_mode}</div>
    <div>network</div><div>${data.network}</div>
    <div>tx / ref</div><div class="txref">${data.payment_evidence.transaction}</div>
    <div>amount</div><div>${data.payment_evidence.amount}</div>
    <div>relevance method</div><div>${data.relevance_method}</div>
  </div></div>`;

  html += `<div class="section"><h2>Final answer</h2><div class="answer">${data.final_answer.text}</div></div>`;

  root.innerHTML = html;
}
render();
</script>
</body>
</html>
